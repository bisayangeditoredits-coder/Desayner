<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinner {
      transform-origin: 16px 16px;
      animation: spin 0.8s linear infinite;
    }
  </style>
  <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(128, 128, 128, 0.15)" stroke-width="3" />
  <path class="spinner" d="M16 3 A 13 13 0 0 1 29 16" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" />
</svg>
